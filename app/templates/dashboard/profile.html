<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile | Sentinel AI</title>
    <!-- Global Theme CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
        /* Re-using your Dashboard Styles for consistency */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background-color: #1a1a2e; color: #e0e0e0; }
        
        /* SIDEBAR */
        .sidebar { width: 260px; background-color: #16213e; padding: 25px; display: flex; flex-direction: column; border-right: 1px solid #0f3460; box-shadow: 2px 0 10px rgba(0,0,0,0.3); }
        .logo { font-size: 1.6rem; font-weight: 800; color: #e94560; margin-bottom: 50px; letter-spacing: 1px; }
        .nav-link { padding: 12px 15px; color: #a0a0a0; text-decoration: none; display: block; margin-bottom: 8px; border-radius: 6px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background-color: #0f3460; color: #fff; transform: translateX(5px); }
        .logout { margin-top: auto; color: #ff6b6b; border: 1px solid #ff6b6b; text-align: center; }
        .logout:hover { background-color: #ff6b6b; color: white; }

        /* MAIN CONTENT */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { border-bottom: 1px solid #0f3460; padding-bottom: 20px; margin-bottom: 30px; }

        /* FORM STYLES */
        .profile-card { background: #16213e; padding: 30px; border-radius: 8px; border: 1px solid #0f3460; max-width: 600px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #4facfe; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #0f1526; border: 1px solid #1f2a48; color: white; border-radius: 4px; box-sizing: border-box; }
        input:focus { border-color: #e94560; outline: none; }
        
        .btn-save { background: linear-gradient(45deg, #4facfe, #00f2fe); color: #0f1526; border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-save:hover { transform: scale(1.02); }

        .alert { padding: 15px; margin-bottom: 20px; border-radius: 4px; text-align: center; }
        .alert.success { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid #4caf50; }
        .alert.error { background: rgba(233, 69, 96, 0.2); color: #e94560; border: 1px solid #e94560; }
    </style>
</head>
<body{% if session.get('theme') == 'light' %} class="light-mode"{% endif %}>

    <div class="sidebar">
        <div class="logo">SENTINEL AI</div>
        <a href="{{ url_for('dashboard.index') }}" class="nav-link">Dashboard</a>
        <a href="#" class="nav-link active">User Profile</a>
        <a href="{{ url_for('settings_bp.settings') }}" class="nav-link">Settings</a>
        <a href="{{ url_for('auth.logout') }}" class="nav-link logout">Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>User Profile</h2>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="profile-card">
            <form method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" value="{{ user.full_name }}" required>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" value="{{ user.email }}" required>
                </div>

                <div class="form-group">
                    <label>New Password (Optional)</label>
                    <input type="password" name="password" placeholder="Leave blank to keep current password">
                </div>

                <button type="submit" class="btn-save">Update Profile</button>
            </form>
        </div>
    </div>

</body>
</html>
