<!DOCTYPE html>
<html>
<head>
    <title>2FA Verification | Sentinel AI</title>
    <style>
        body { background: #0f1526; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #16213e; padding: 40px; border: 1px solid #1f2a48; border-radius: 8px; text-align: center; }
        input { padding: 10px; width: 100%; margin: 10px 0; background: #0f1526; border: 1px solid #4facfe; color: white; text-align: center; letter-spacing: 5px; font-size: 1.2rem; }
        button { background: #e94560; color: white; border: none; padding: 10px 20px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #4facfe;">Security Check</h2>
        <p>Enter the OTP sent to your email.</p>
        <form method="POST">
            <input type="text" name="otp" placeholder="######" required>
            <button type="submit">Verify</button>
        </form>
    </div>
</body>
</html>
