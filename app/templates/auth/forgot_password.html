<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password | Sentinel AI</title>
    <style>
        body { background: #0f1526; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #16213e; padding: 40px; border: 1px solid #1f2a48; border-radius: 8px; width: 300px; }
        input { padding: 10px; width: 100%; margin: 10px 0; background: #0f1526; border: 1px solid #2c3e50; color: white; box-sizing: border-box; }
        button { background: #4facfe; color: #0f1526; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        a { color: #8892b0; font-size: 0.9rem; text-decoration: none; display: block; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align: center;">Recovery</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<div style="color: #ff6b6b; text-align: center; margin-bottom: 10px;">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form method="POST">
            <label>Registered Email</label>
            <input type="email" name="email" required>
            <button type="submit">Send Reset Code</button>
        </form>
        <a href="{{ url_for('auth.login') }}">Back to Login</a>
    </div>
</body>
</html>
