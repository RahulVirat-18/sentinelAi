<!DOCTYPE html>
<html>
<head>
    <title>Reset Password | Sentinel AI</title>
    <style>
        body { background: #0f1526; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #16213e; padding: 40px; border: 1px solid #1f2a48; border-radius: 8px; width: 300px; }
        input { padding: 10px; width: 100%; margin: 10px 0; background: #0f1526; border: 1px solid #2c3e50; color: white; box-sizing: border-box; }
        button { background: #4caf50; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align: center;">Set New Password</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<div style="color: #ff6b6b; text-align: center; margin-bottom: 10px;">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form method="POST">
            <label>OTP Code</label>
            <input type="text" name="otp" placeholder="Enter code from email" required>
            
            <label>New Password</label>
            <input type="password" name="password" required>
            
            <button type="submit">Update Password</button>
        </form>
    </div>
</body>
</html>
