<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Sentinel AI</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #34495e; }
        .link { text-align: center; margin-top: 10px; font-size: 0.9rem; }
        .alert { color: red; text-align: center; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Login</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div style="text-align: center; margin-top: 15px;">
            <a href="{{ forgot_password_url }}" style="color: #4facfe; text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
        </div>
        <div class="link">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Sign Up</a>
        </div>
        <div class="link" style="margin-top:8px;">
            <a href="{{ url_for('home') }}" style="color: #4facfe; text-decoration: none; font-size: 0.9rem;">Back to Home</a>
        </div>
    </div>
</body>
</html>
